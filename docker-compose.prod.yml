services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: currency-converter:latest
    container_name: currency-converter
    restart: unless-stopped
    environment:
      NODE_ENV: production
      RATE_PROVIDER: ${RATE_PROVIDER}
      OPEN_EXCHANGE_RATES_APP_ID: ${OPEN_EXCHANGE_RATES_APP_ID}
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  web:
    external: true
